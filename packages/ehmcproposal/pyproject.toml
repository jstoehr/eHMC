[project]
name = "ehmcproposal"
version = "0.1.0"
description = "Proposal calibration for self-calibrated randomized Hamiltonian Monte Carlo"
requires-python = "==3.12.*"
dependencies = [
    "numpy>=2.2,<2.3",
    "pandas>=2.2,<2.3",
    "pyarrow>=18.1,<19",
    "scipy>=1.15,<1.16",
    "torch==2.5.1",
    "zuko>=1.5",
    "rpy2==3.5.17",
    "tqdm>=4.66,<5",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]